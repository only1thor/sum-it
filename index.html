<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, interactive-widget=resizes-content">
  <title>Sum It</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0d1117;
      --bg-elevated: #161b22;
      --fg: #e6edf3;
      --muted: #7d8590;
      --accent: #58a6ff;
      --accent-glow: rgba(88, 166, 255, 0.15);
      --success: #3fb950;
      --border: #30363d;
      --danger: #f85149;
      --card: #21262d;
      --radius: 12px;
      --radius-sm: 8px;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      font-size: 16px;
      -webkit-text-size-adjust: 100%;
    }

    body {
      font-family: 'Space Grotesk', sans-serif;
      background: var(--bg);
      color: var(--fg);
      min-height: 100vh;
      min-height: 100dvh;
      line-height: 1.5;
      padding: 16px;
      padding-bottom: env(safe-area-inset-bottom, 16px);
    }

    .header {
      text-align: center;
      margin-bottom: 20px;
      animation: fadeSlideDown 0.4s ease-out;
    }

    .header h1 {
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--fg);
    }

    .header p {
      font-size: 0.875rem;
      color: var(--muted);
      margin-top: 4px;
    }

    .sort-bar {
      display: flex;
      gap: 10px;
      align-items: center;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 12px;
      margin-bottom: 24px;
      animation: fadeSlideDown 0.4s ease-out 0.05s backwards;
    }

    .sort-label {
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--muted);
      white-space: nowrap;
    }

    .sort-select-wrapper {
      position: relative;
      flex: 1;
    }

    .sort-select {
      width: 100%;
      appearance: none;
      -webkit-appearance: none;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--fg);
      font-family: 'Space Grotesk', sans-serif;
      font-size: 16px;
      padding: 8px 32px 8px 12px;
      cursor: pointer;
      transition: border-color 0.15s ease;
    }

    .sort-select:focus {
      outline: none;
      border-color: var(--accent);
    }

    .select-arrow {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      pointer-events: none;
      color: var(--muted);
      width: 14px;
      height: 14px;
    }

    .order-toggle {
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--muted);
      width: 36px;
      height: 34px;
      cursor: pointer;
      transition: all 0.15s ease;
      flex-shrink: 0;
    }

    .order-toggle:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .order-toggle:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }

    .order-toggle svg {
      transition: transform 0.2s ease;
    }

    .order-toggle.desc svg {
      transform: rotate(180deg);
    }

    .rows-container {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 90px; 
    }

    .row {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      animation: rowEnter 0.3s ease-out backwards;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .row:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    .row-content {
      display: grid;
      grid-template-columns: 1fr 40%;
      gap: 12px;
      align-items: start;
    }

    .comment-wrapper {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .comment-label {
      font-size: 0.625rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--muted);
    }

    .comment-input {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 16px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--fg);
      padding: 10px 12px;
      width: 100%;
      transition: border-color 0.15s ease;
    }

    .comment-input:focus {
      outline: none;
      border-color: var(--accent);
    }

    .comment-input::placeholder {
      color: var(--muted);
    }

    .math-wrapper {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .math-label {
      font-size: 0.625rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--muted);
    }

    .math-input {
      font-family: 'JetBrains Mono', monospace;
      font-size: 16px;
      font-weight: 600;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--success);
      padding: 10px 12px;
      width: 100%;
      text-align: right;
      transition: border-color 0.15s ease;
    }

    .math-input:focus {
      outline: none;
      border-color: var(--accent);
    }

    .math-input::placeholder {
      color: var(--muted);
    }

    .math-error {
      font-size: 0.6875rem;
      color: var(--danger);
      display: none;
    }

    .math-error.visible {
      display: block;
      animation: shake 0.3s ease;
    }

    .row-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid var(--border);
    }

    .row-result {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.875rem;
      color: var(--muted);
    }

    .row-result span {
      color: var(--success);
      font-weight: 600;
    }

    .delete-btn {
      background: transparent;
      border: none;
      color: var(--muted);
      cursor: pointer;
      padding: 6px;
      border-radius: 6px;
      transition: all 0.15s ease;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .delete-btn:hover {
      background: rgba(248, 81, 73, 0.1);
      color: var(--danger);
    }

    .delete-btn:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }

    .bottom-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: var(--bg-elevated);
      border-top: 1px solid var(--border);
      padding: 16px;
      padding-bottom: calc(16px + env(safe-area-inset-bottom, 0px));
      
      display: flex;
      justify-content: space-between;
      align-items: center;
      
      z-index: 20;
      animation: slideUp 0.3s ease-out;
    }
    
    @media (min-width: 600px) {
        .bottom-bar {
            max-width: 600px;
            left: 50%;
            transform: translateX(-50%);
            border-top-left-radius: var(--radius);
            border-top-right-radius: var(--radius);
            border-top: 1px solid var(--border);
        }
        
        @keyframes slideUp {
          from { 
              opacity: 0; 
              transform: translateX(-50%) translateY(10px); 
          }
          to { 
              opacity: 1; 
              transform: translateX(-50%) translateY(0); 
          }
        }
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .add-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--fg);
      font-family: 'Space Grotesk', sans-serif;
      font-size: 16px;
      font-weight: 600;
      padding: 10px 18px;
      border-radius: var(--radius-sm);
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: all 0.2s ease;
      white-space: nowrap;
    }

    .add-btn:hover {
      background: var(--card);
      border-color: var(--accent);
      color: var(--accent);
    }

    .add-btn:active {
      transform: scale(0.97);
    }

    .add-btn:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }

    .add-btn svg {
      color: var(--accent);
    }

    .total-section {
      display: flex;
      align-items: baseline;
      gap: 12px;
    }

    .total-label {
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--muted);
    }

    .total-value {
      font-family: 'JetBrains Mono', monospace;
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--success);
      letter-spacing: -0.02em;
      min-width: 60px;
      text-align: right;
    }

    .empty-state {
      text-align: center;
      padding: 48px 24px;
      color: var(--muted);
      animation: fadeIn 0.4s ease-out;
    }

    .empty-state svg {
      width: 48px;
      height: 48px;
      margin-bottom: 16px;
      opacity: 0.5;
    }

    .empty-state p {
      font-size: 0.875rem;
    }

    @keyframes fadeSlideDown {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes rowEnter {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-4px); }
      75% { transform: translateX(4px); }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }

    @media (min-width: 600px) {
      body {
        max-width: 600px;
        margin: 0 auto;
        padding: 32px;
      }

      .header h1 {
        font-size: 1.75rem;
      }

      .row-content {
        grid-template-columns: 1fr 35%;
      }
    }
  </style>
</head>
<body>
  <header class="header">
    <h1>Sum It</h1>
    <p>Quick math, zero friction</p>
  </header>

  <div class="sort-bar" role="toolbar" aria-label="Sort options">
    <span class="sort-label">Sort</span>
    
    <div class="sort-select-wrapper">
      <select id="sortSelect" class="sort-select" aria-label="Sort by">
        <option value="added">Added</option>
        <option value="alpha">Alphabetical</option>
        <option value="value">Row Total</option>
      </select>
      <svg class="select-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="6 9 12 15 18 9"></polyline>
      </svg>
    </div>

    <button id="orderToggle" class="order-toggle desc" aria-label="Toggle sort direction (descending)" title="Toggle Ascending/Descending">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="12" y1="19" x2="12" y2="5"></line>
        <polyline points="5 12 12 5 19 12"></polyline>
      </svg>
    </button>
  </div>

  <main class="rows-container" id="rowsContainer" role="list" aria-label="Calculation rows">
  </main>

  <footer class="bottom-bar" role="status" aria-live="polite">
    <button class="add-btn" id="addBtn" aria-label="Add new row">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
        <line x1="12" y1="5" x2="12" y2="19"></line>
        <line x1="5" y1="12" x2="19" y2="12"></line>
      </svg>
      Add
    </button>

    <div class="total-section">
      <span class="total-label">Total</span>
      <span class="total-value" id="totalValue">0</span>
    </div>
  </footer>

  <script>
    let rows = [];
    let nextId = 1;
    let sortBy = 'added';
    let sortOrder = 'desc';

    let rowsContainer = null;
    let totalValueEl = null;
    let addBtn = null;
    let sortSelect = null;
    let orderToggle = null;

    const STORAGE_KEY = 'sum-it-rows';
    
    function saveState() {
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify({ 
          rows, 
          nextId,
          sortBy,
          sortOrder 
        }));
      } catch (e) {
        // Storage unavailable
      }
    }

    function loadState() {
      try {
        const data = localStorage.getItem(STORAGE_KEY);
        if (data) {
          const parsed = JSON.parse(data);
          rows = Array.isArray(parsed.rows) ? parsed.rows : [];
          nextId = typeof parsed.nextId === 'number' ? parsed.nextId : 1;
          
          if (['added', 'alpha', 'value'].includes(parsed.sortBy)) {
            sortBy = parsed.sortBy;
            if (sortSelect) sortSelect.value = sortBy;
          }
          if (['asc', 'desc'].includes(parsed.sortOrder)) {
            sortOrder = parsed.sortOrder;
            updateOrderToggleUI();
          }
        }
      } catch (e) {
        rows = [];
        nextId = 1;
      }
    }

    function evaluateMath(expression) {
      if (!expression || expression.trim() === '') {
        return { value: 0, error: false };
      }

      const sanitized = expression.replace(/\s+/g, '');
      const safePattern = /^[\d+\-*/().]+$/;
      
      if (!safePattern.test(sanitized)) {
        return { value: 0, error: true };
      }

      let balance = 0;
      for (const char of sanitized) {
        if (char === '(') balance++;
        if (char === ')') balance--;
        if (balance < 0) return { value: 0, error: true };
      }
      if (balance !== 0) return { value: 0, error: true };

      try {
        const result = new Function('"use strict"; return (' + sanitized + ')')();
        
        if (typeof result !== 'number' || !isFinite(result)) {
          return { value: 0, error: true };
        }
        
        return { value: result, error: false };
      } catch (e) {
        return { value: 0, error: true };
      }
    }

    function formatNumber(num) {
      if (Math.abs(num) >= 1000000) {
        return num.toExponential(2);
      }
      return parseFloat(num.toFixed(4)).toLocaleString('en-US', { maximumFractionDigits: 4 });
    }

    function calculateTotal() {
      return rows.reduce((sum, row) => {
        const result = evaluateMath(row.math);
        return sum + (result.error ? 0 : result.value);
      }, 0);
    }

    function getSortedRows() {
      const sorted = [...rows];
      const dir = sortOrder === 'asc' ? 1 : -1;

      switch (sortBy) {
        case 'alpha':
          sorted.sort((a, b) => {
            const aText = (a.comment || '').toLowerCase();
            const bText = (b.comment || '').toLowerCase();
            return aText.localeCompare(bText) * dir;
          });
          break;

        case 'value':
          sorted.sort((a, b) => {
            const aVal = evaluateMath(a.math).error ? 0 : evaluateMath(a.math).value;
            const bVal = evaluateMath(b.math).error ? 0 : evaluateMath(b.math).value;
            return (aVal - bVal) * dir;
          });
          break;

        case 'added':
        default:
          sorted.sort((a, b) => (a.id - b.id) * dir);
          break;
      }

      return sorted;
    }

    function updateOrderToggleUI() {
      if (!orderToggle) return;
      
      if (sortOrder === 'asc') {
        orderToggle.classList.remove('desc');
        orderToggle.setAttribute('aria-label', 'Toggle sort direction (ascending)');
      } else {
        orderToggle.classList.add('desc');
        orderToggle.setAttribute('aria-label', 'Toggle sort direction (descending)');
      }
    }

    function renderEmptyState() {
      return `
        <div class="empty-state">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path>
            <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path>
            <line x1="12" y1="6" x2="12" y2="12"></line>
            <line x1="9" y1="9" x2="15" y2="9"></line>
          </svg>
          <p>Add your first row to start summing</p>
        </div>
      `;
    }

    function renderRow(row, index) {
      const result = evaluateMath(row.math);
      const errorClass = result.error && row.math ? 'visible' : '';
      
      return `
        <article class="row" data-id="${row.id}" role="listitem" style="animation-delay: ${index * 0.03}s">
          <div class="row-content">
            <div class="comment-wrapper">
              <label class="comment-label" for="comment-${row.id}">Comment</label>
              <input 
                type="text" 
                class="comment-input" 
                id="comment-${row.id}"
                placeholder="e.g. Groceries"
                value="${escapeHtml(row.comment)}"
                data-field="comment"
                autocomplete="off"
                autocapitalize="sentences"
                spellcheck="true"
                enterkeyhint="next"
                aria-describedby="math-error-${row.id}"
              />
            </div>
            <div class="math-wrapper">
              <label class="math-label" for="math-${row.id}">Math</label>
              <input 
                type="text" 
                class="math-input" 
                id="math-${row.id}"
                placeholder="12.5 + 3"
                value="${escapeHtml(row.math)}"
                data-field="math"
                inputmode="text"
                autocomplete="off"
                autocapitalize="none"
                spellcheck="false"
                enterkeyhint="done"
                aria-describedby="math-error-${row.id}"
              />
              <span class="math-error ${errorClass}" id="math-error-${row.id}">Invalid expression</span>
            </div>
          </div>
          <div class="row-footer">
            <div class="row-result">= <span>${formatNumber(result.value)}</span></div>
            <button class="delete-btn" aria-label="Delete row" data-action="delete">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="3 6 5 6 21 6"></polyline>
                <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
              </svg>
            </button>
          </div>
        </article>
      `;
    }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str || '';
      return div.innerHTML;
    }

    function render() {
      if (!rowsContainer || !totalValueEl) return;

      const sortedRows = getSortedRows();

      if (sortedRows.length === 0) {
        rowsContainer.innerHTML = renderEmptyState();
      } else {
        rowsContainer.innerHTML = sortedRows.map((row, i) => renderRow(row, i)).join('');
      }
      
      totalValueEl.textContent = formatNumber(calculateTotal());
    }

    function addRow() {
      const newRow = {
        id: nextId++,
        comment: '',
        math: ''
      };
      
      rows.push(newRow);
      saveState();
      render();
      
      const newInput = rowsContainer.querySelector(`[data-id="${newRow.id}"] .comment-input`);
      if (newInput) {
        newInput.focus({ preventScroll: true });
        
        setTimeout(() => {
          newInput.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }, 400);
      }
    }

    function deleteRow(id) {
      rows = rows.filter(row => row.id !== id);
      saveState();
      render();
    }

    function updateRow(id, field, value) {
      const row = rows.find(r => r.id === id);
      if (row) {
        row[field] = value;
        saveState();
        
        if (field === 'math') {
          const rowEl = rowsContainer.querySelector(`[data-id="${id}"]`);
          const result = evaluateMath(value);
          const resultEl = rowEl.querySelector('.row-result span');
          const errorEl = rowEl.querySelector('.math-error');
          
          resultEl.textContent = formatNumber(result.value);
          
          if (result.error && value) {
            errorEl.classList.add('visible');
          } else {
            errorEl.classList.remove('visible');
          }
          
          totalValueEl.textContent = formatNumber(calculateTotal());
        }
      }
    }

    // Handle keyboard navigation between fields
    function handleKeyDown(e) {
      // Only handle Enter key
      if (e.key !== 'Enter') return;
      
      // In comment field: move focus to math field
      if (e.target.classList.contains('comment-input')) {
        e.preventDefault();
        const row = e.target.closest('.row');
        if (row) {
          const mathInput = row.querySelector('.math-input');
          if (mathInput) {
            mathInput.focus();
          }
        }
      }
      
      // In math field: blur to close keyboard (Done action)
      else if (e.target.classList.contains('math-input')) {
        e.preventDefault();
        e.target.blur();
      }
    }

    function handleSortChange(e) {
      sortBy = e.target.value;
      updateOrderToggleUI();
      saveState();
      render();
    }

    function handleOrderToggle() {
      sortOrder = sortOrder === 'asc' ? 'desc' : 'asc';
      updateOrderToggleUI();
      saveState();
      render();
    }

    function handleContainerClick(e) {
      const deleteBtn = e.target.closest('[data-action="delete"]');
      if (deleteBtn) {
        const row = deleteBtn.closest('.row');
        if (row) {
          const id = parseInt(row.dataset.id, 10);
          deleteRow(id);
        }
      }
    }

    function handleContainerInput(e) {
      const input = e.target;
      if (input.dataset.field) {
        const row = input.closest('.row');
        if (row) {
          const id = parseInt(row.dataset.id, 10);
          updateRow(id, input.dataset.field, input.value);
        }
      }
    }

    function init() {
      rowsContainer = document.getElementById('rowsContainer');
      totalValueEl = document.getElementById('totalValue');
      addBtn = document.getElementById('addBtn');
      sortSelect = document.getElementById('sortSelect');
      orderToggle = document.getElementById('orderToggle');

      if (!rowsContainer || !totalValueEl || !addBtn) {
        console.error('Required DOM elements not found');
        return;
      }

      loadState();

      addBtn.addEventListener('click', addRow);
      rowsContainer.addEventListener('click', handleContainerClick);
      rowsContainer.addEventListener('input', handleContainerInput);
      rowsContainer.addEventListener('keydown', handleKeyDown);
      
      if (sortSelect) {
        sortSelect.addEventListener('change', handleSortChange);
      }
      
      if (orderToggle) {
        orderToggle.addEventListener('click', handleOrderToggle);
      }

      render();
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', init);
    } else {
      init();
    }
  </script>
</body>
</html>
